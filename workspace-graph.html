// ── Layout engine ──
const COL_COUNT = 4;
const GROUP_W = 260;
const GROUP_H_COLLAPSED = 40;
const NODE_H = 28;
const NODE_PAD = 4;
const GROUP_PAD = 16;
const GRID_GAP_X = 40;
const GRID_GAP_Y = 30;
const MARGIN = 30;

let expanded = {};
let hiddenCats = {};
let nodePositions = {};
let allNodeIndex = {};

// Build node index
groups.forEach(g => {
  allNodeIndex[g.id] = g;
  (g.children || []).forEach(c => { allNodeIndex[c.id] = c; c._groupId = g.id; });
});

function getGroupHeight(g) {
  if (!expanded[g.id]) return GROUP_H_COLLAPSED;
  return GROUP_H_COLLAPSED + (g.children.length * (NODE_H + NODE_PAD)) + GROUP_PAD;
}

function computeLayout() {
  nodePositions = {};
  const visibleGroups = groups.filter(g => !hiddenCats[g.category]);

  // Compute column assignments - use fixed positions based on category order
  const cols = [];
  for (let i = 0; i < COL_COUNT; i++) cols.push({ height: 0, items: [] });

  // Assign groups to fixed columns based on category for stability
  const colAssignment = {};
  visibleGroups.forEach((g, i) => {
    // Fixed column based on order in the groups array
    const originalIdx = groups.indexOf(g);
    colAssignment[g.id] = originalIdx % COL_COUNT;
  });

  visibleGroups.forEach(g => {
    const colIdx = colAssignment[g.id];
    const h = getGroupHeight(g);
    const x = MARGIN + colIdx * (GROUP_W + GRID_GAP_X);
    const y = MARGIN + cols[colIdx].height;

    nodePositions[g.id] = { x, y, w: GROUP_W, h, isGroup: true, category: g.category };

    if (expanded[g.id]) {
      g.children.forEach((c, i) => {
        nodePositions[c.id] = {
          x: x + 10,
          y: y + GROUP_H_COLLAPSED + i * (NODE_H + NODE_PAD),
          w: GROUP_W - 20,
          h: NODE_H,
          isGroup: false,
          category: g.category,
          groupId: g.id
        };
      });
    }

    cols[colIdx].height += h + GRID_GAP_Y;
  });
}

// ── Rendering ──
const svg = d3.select('#graph');
const zoomG = svg.append('g');
const edgeG = zoomG.append('g').attr('class', 'edges');
const nodeG = zoomG.append('g').attr('class', 'nodes');

const zoom = d3.zoom()
  .scaleExtent([0.2, 3])
  .on('zoom', e => zoomG.attr('transform', e.transform));
svg.call(zoom);

function resizeSVG() {
  const wrap = document.getElementById('canvas-wrap');
  svg.attr('width', wrap.clientWidth).attr('height', wrap.clientHeight);
}
window.addEventListener('resize', resizeSVG);
resizeSVG();

function render() {
  computeLayout();

  // ── Groups ──
  const visibleGroups = groups.filter(g => !hiddenCats[g.category]);
  const gSel = nodeG.selectAll('.group-g').data(visibleGroups, d => d.id);
  gSel.exit().remove();

  const gEnter = gSel.enter().append('g').attr('class', 'group-g group-header')
    .on('click', (e, d) => { expanded[d.id] = !expanded[d.id]; render(); });

  gEnter.append('rect').attr('rx', 6).attr('ry', 6);
  gEnter.append('text').attr('class', 'group-label');
  gEnter.append('text').attr('class', 'group-toggle');
  gEnter.append('text').attr('class', 'group-count');

  const gMerge = gEnter.merge(gSel);
  gMerge.each(function(d) {
    const pos = nodePositions[d.id];
    if (!pos) return;
    const g = d3.select(this);
    g.transition().duration(300)
      .attr('transform', `translate(${pos.x},${pos.y})`);

    const cat = CATEGORIES[d.category];
    g.select('rect')
      .transition().duration(300)
      .attr('width', pos.w).attr('height', pos.h)
      .attr('fill', '#1e2a45')
      .attr('stroke', cat.color).attr('stroke-width', 1.5);

    g.select('.group-label')
      .attr('x', 32).attr('y', 26)
      .attr('fill', cat.color).attr('font-size', '14px').attr('font-weight', 'bold')
      .text(d.label);

    g.select('.group-toggle')
      .attr('x', 12).attr('y', 26)
      .attr('fill', cat.color).attr('font-size', '14px')
      .text(expanded[d.id] ? '\u25BC' : '\u25B6');

    g.select('.group-count')
      .attr('x', pos.w - 12).attr('y', 26)
      .attr('fill', '#666').attr('font-size', '11px').attr('text-anchor', 'end')
      .text(`${d.children.length}`);
  });

  // ── Child nodes ──
  const allChildren = visibleGroups.flatMap(g => expanded[g.id] ? g.children : []);
  const nSel = nodeG.selectAll('.node-g').data(allChildren, d => d.id);
  nSel.exit().remove();

  const nEnter = nSel.enter().append('g').attr('class', 'node-g node-box')
    .on('click', (e, d) => { e.stopPropagation(); showSidebar(d); });

  nEnter.append('rect').attr('rx', 3).attr('ry', 3);
  nEnter.append('text');

  const nMerge = nEnter.merge(nSel);
  nMerge.each(function(d) {
    const pos = nodePositions[d.id];
    if (!pos) return;
    const g = d3.select(this);
    const cat = CATEGORIES[pos.category];

    g.transition().duration(300)
      .attr('transform', `translate(${pos.x},${pos.y})`);

    g.select('rect')
      .attr('width', pos.w).attr('height', pos.h)
      .attr('fill', '#252a3a')
      .attr('stroke', cat ? cat.color : '#555').attr('stroke-width', 0.8)
      .attr('opacity', 0.9);

    g.select('text')
      .attr('x', 8).attr('y', 18)
      .attr('fill', '#ddd').attr('font-size', '12px')
      .text(d.label.length > 30 ? d.label.slice(0, 28) + '\u2026' : d.label);
  });

  // ── Edges ──
  const visibleEdges = crossEdges.filter(e => nodePositions[e.from] && nodePositions[e.to]);
  const eSel = edgeG.selectAll('.edge-g').data(visibleEdges, d => d.from + '-' + d.to);
  eSel.exit().remove();

  const eEnter = eSel.enter().append('g').attr('class', 'edge-g');
  eEnter.append('path').attr('class', 'edge');
  eEnter.append('text').attr('class', 'edge-label');

  const eMerge = eEnter.merge(eSel);
  eMerge.each(function(d) {
    const fromPos = nodePositions[d.from];
    const toPos = nodePositions[d.to];
    if (!fromPos || !toPos) return;

    const fx = fromPos.x + fromPos.w / 2;
    const fy = fromPos.y + fromPos.h / 2;
    const tx = toPos.x + toPos.w / 2;
    const ty = toPos.y + toPos.h / 2;

    // Determine best connection points
    let x1, y1, x2, y2;
    if (Math.abs(fx - tx) > Math.abs(fy - ty)) {
      x1 = fx < tx ? fromPos.x + fromPos.w : fromPos.x;
      y1 = fy;
      x2 = fx < tx ? toPos.x : toPos.x + toPos.w;
      y2 = ty;
    } else {
      x1 = fx;
      y1 = fy < ty ? fromPos.y + fromPos.h : fromPos.y;
      x2 = tx;
      y2 = fy < ty ? toPos.y : toPos.y + toPos.h;
    }

    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;
    const cx1 = x1 + (mx - x1) * 0.5;
    const cy1 = y1;
    const cx2 = x2 - (x2 - mx) * 0.5;
    const cy2 = y2;

    const fromCat = fromPos.category;
    const col = CATEGORIES[fromCat] ? CATEGORIES[fromCat].color : '#555';

    d3.select(this).select('path')
      .attr('d', `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`)
      .attr('stroke', col)
      .attr('marker-end', 'none');

    d3.select(this).select('.edge-label')
      .attr('x', mx).attr('y', my - 4)
      .attr('text-anchor', 'middle')
      .text(d.label);
  });
}

// ── Sidebar ──
function showSidebar(node) {
  const sb = document.getElementById('sidebar');
  const content = document.getElementById('sidebar-content');
  sb.classList.remove('hidden');
  resizeCanvas();

  const refsOut = crossEdges.filter(e => e.from === node.id).map(e => ({ id: e.to, label: e.label, name: (allNodeIndex[e.to] || {}).label || e.to }));
  const refsIn = crossEdges.filter(e => e.to === node.id).map(e => ({ id: e.from, label: e.label, name: (allNodeIndex[e.from] || {}).label || e.from }));

  let html = `<h2>${node.label}</h2>`;
  const group = groups.find(g => g.id === node._groupId) || groups.find(g => g.id === node.id);
  if (group) html += `<p class="meta">Category: ${group.category || group.label}</p>`;
  if (node.desc) html += `<p class="desc">${node.desc}</p>`;
  if (node.meta) html += `<p class="meta">${node.meta}</p>`;

  if (refsOut.length) {
    html += `<h3>References Out (${refsOut.length})</h3><ul class="ref-list">`;
    refsOut.forEach(r => { html += `<li onclick="focusNode('${r.id}')">\u2192 ${r.name} <span style="color:#666">(${r.label})</span></li>`; });
    html += '</ul>';
  }
  if (refsIn.length) {
    html += `<h3>Referenced By (${refsIn.length})</h3><ul class="ref-list">`;
    refsIn.forEach(r => { html += `<li onclick="focusNode('${r.id}')">\u2190 ${r.name} <span style="color:#666">(${r.label})</span></li>`; });
    html += '</ul>';
  }

  if (node.children) {
    html += `<h3>Contains (${node.children.length})</h3><ul class="ref-list">`;
    node.children.forEach(c => { html += `<li onclick="focusNode('${c.id}')">${c.label}</li>`; });
    html += '</ul>';
  }

  content.innerHTML = html;
}

function resizeCanvas() {
  const sb = document.getElementById('sidebar');
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.right = sb.classList.contains('hidden') ? '0' : '320px';
  resizeSVG();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
  resizeCanvas();
}

function focusNode(id) {
  const node = allNodeIndex[id];
  if (node && node._groupId && !expanded[node._groupId]) {
    expanded[node._groupId] = true;
    render();
  }
  setTimeout(() => {
    const pos = nodePositions[id];
    if (!pos) return;
    const wrap = document.getElementById('canvas-wrap');
    const cx = wrap.clientWidth / 2;
    const cy = wrap.clientHeight / 2;
    svg.transition().duration(500).call(
      zoom.transform,
      d3.zoomIdentity.translate(cx - pos.x - pos.w/2, cy - pos.y - pos.h/2)
    );
    nodeG.selectAll('.node-g, .group-g').classed('search-hit', false);
    nodeG.selectAll('.node-g, .group-g').filter(d => d.id === id).classed('search-hit', true);
    if (node) showSidebar(node);
  }, 50);
}

// ── Search ──
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    nodeG.selectAll('.node-g, .group-g').classed('search-hit', false).classed('node-dimmed', false);
    return;
  }
  const allNodes = [...groups, ...groups.flatMap(g => g.children || [])];
  const hits = new Set();
  allNodes.forEach(n => {
    const text = (n.label + ' ' + (n.desc || '') + ' ' + (n.meta || '')).toLowerCase();
    if (text.includes(q)) hits.add(n.id);
  });

  groups.forEach(g => {
    if ((g.children || []).some(c => hits.has(c.id))) {
      expanded[g.id] = true;
    }
  });
  render();

  nodeG.selectAll('.node-g').classed('search-hit', d => hits.has(d.id)).classed('node-dimmed', d => !hits.has(d.id) && hits.size > 0);
  nodeG.selectAll('.group-g').classed('search-hit', d => hits.has(d.id)).classed('node-dimmed', d => !hits.has(d.id) && !(d.children || []).some(c => hits.has(c.id)) && hits.size > 0);
});

// ── Controls ──
function expandAll() { groups.forEach(g => expanded[g.id] = true); render(); }
function collapseAll() { groups.forEach(g => expanded[g.id] = false); render(); }
function resetView() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity); }

// ── Legend ──
function buildLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '<div style="font-weight:bold;margin-bottom:6px;color:#aaa;">Categories</div>';
  Object.entries(CATEGORIES).forEach(([name, cat]) => {
    const div = document.createElement('div');
    div.className = 'item' + (hiddenCats[name] ? ' dim' : '');
    div.innerHTML = `<span class="swatch" style="background:${cat.color}"></span><span>${name}</span>`;
    div.onclick = () => { hiddenCats[name] = !hiddenCats[name]; buildLegend(); render(); };
    leg.appendChild(div);
  });
}
buildLegend();

// ── Initial render ──
expanded['identity'] = true;
expanded['rules'] = true;
render();

// Initial zoom to fit
setTimeout(() => {
  const wrap = document.getElementById('canvas-wrap');
  const allPos = Object.values(nodePositions);
  if (!allPos.length) return;
  const minX = d3.min(allPos, p => p.x);
  const minY = d3.min(allPos, p => p.y);
  const maxX = d3.max(allPos, p => p.x + p.w);
  const maxY = d3.max(allPos, p => p.y + p.h);
  const bw = maxX - minX + 60;
  const bh = maxY - minY + 60;
  const scale = Math.min(wrap.clientWidth / bw, wrap.clientHeight / bh, 1.2);
  const tx = (wrap.clientWidth - bw * scale) / 2 - minX * scale + 30;
  const ty = (wrap.clientHeight - bh * scale) / 2 - minY * scale + 30;
  svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}, 100);
</script>
</body>
</html>
